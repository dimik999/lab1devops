---
# Ansible playbook для деплоя веб-приложения на удалённый сервер
- name: Deploy lab1 app
  hosts: webservers
  become: yes
  vars:
    app_name: lab1-app
    image: "{{ registry }}/{{ image_name }}:latest"
    port: 5000
  tasks:
    - name: Ensure Docker is installed
      ansible.builtin.apt:
        name: docker.io
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Ensure Docker is installed (RedHat)
      ansible.builtin.yum:
        name: docker
        state: present
      when: ansible_os_family == "RedHat"

    - name: Ensure Docker service is started
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Stop and remove existing container
      ansible.builtin.command:
        cmd: "docker stop {{ app_name }} 2>/dev/null; docker rm {{ app_name }} 2>/dev/null; true"
      changed_when: false
      ignore_errors: yes

    - name: Pull Docker image
      community.docker.docker_image:
        name: "{{ image }}"
        source: pull

    - name: Run application container
      community.docker.docker_container:
        name: "{{ app_name }}"
        image: "{{ image }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "{{ port }}:5000"
